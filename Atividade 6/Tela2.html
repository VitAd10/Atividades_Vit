<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Tela2.css">
</head>
<body>
    <div class="painel-dashboard">
        <h1 class="titulo-painel">Painel de Controle Escolar</h1>
    
        <div class="secao-cards">
            <div class="card-resumo azul">
                <h3>Total de Alunos</h3>
                <p class="numero">142</p>
            </div>
            <div class="card-resumo verde">
                <h3>Presenças Hoje</h3>
                <p class="numero">92%</p>
            </div>
            <div class="card-resumo vermelho">
                <h3>Faltas Críticas</h3>
                <p class="numero">8</p>
            </div>
        </div>
    
        <div class="secao-tabela">
            <h2>Lista de Chamada Recente</h2>
            <div class="responsivo-tabela">
                <table class="tabela-dados">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Turma</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Ana Silva</td>
                            <td>1º Ano A</td>
                            <td><span class="badge presente">Presente</span></td>
                        </tr>
                        <tr>
                            <td>Bruno Santos</td>
                            <td>1º Ano A</td>
                            <td><span class="badge ausente">Ausente</span></td>
                        </tr>
                        <tr>
                            <td>Carlos Oliveira</td>
                            <td>2º Ano B</td>
                            <td><span class="badge presente">Presente</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
