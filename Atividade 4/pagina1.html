<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="pagina1.css">
</head>
<body>
  
<h1 class="titulo-centralizado">Projeto Escolar</h1>

<div class="container-botao">
    <button class="botao-colorido">Clique Aqui</button>
</div>
<div class="caixa-estilizada">
    <h2>Ideia do projeto</h2>
    <p>Site para administrar os livros da biblioteca, um site para registrar os empréstimos de livros ou devoluções não feitas</p>
</div>
<div class="container-formulario">
    <h2>Cadastro de Aluno</h2>
    
    <form>
        <div class="grupo-campo">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite o nome do aluno">
        </div>

        <div class="grupo-campo">
            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="exemplo@escola.com">
        </div>

        <div class="grupo-linha">
            <div class="grupo-campo">
                <label for="data-nasc">Data de Nascimento:</label>
                <input type="date" id="data-nasc">
            </div>
            
            <div class="grupo-campo">
                <label for="turma">Turma / Ano:</label>
                <input type="text" id="turma" placeholder="Ex: 1º Ano A">
            </div>
        </div>

        <div class="container-botao">
            <button type="submit" class="botao-colorido">Cadastrar Aluno</button>
        </div>
    </form>
</div>
</body>
</html>
