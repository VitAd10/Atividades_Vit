<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form class="formulario-cadastro">
        <h2>Cadastro de Usuário</h2>
        
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
    
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu-email@email.com" required>
    
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
    
        <button type="submit">Cadastrar</button>
    </form>
    <form class="formulario-tarefa">
        <h2>Nova Tarefa</h2>
        
        <label for="titulo">Título da Tarefa:</label>
        <input type="text" id="titulo" name="titulo" placeholder="Ex: Devolver livro O Alquimista" required>
    
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" placeholder="Escreva os detalhes da tarefa aqui..." rows="4"></textarea>
    
        <label for="prioridade">Prioridade:</label>
        <select id="prioridade" name="prioridade">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
        </select>
    
        <button type="submit">Adicionar Tarefa</button>
    </form>
    <form class="formulario-reserva">
        <h2>Reserva de Espaço Escolar</h2>
        
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
    
        <label for="turma">Turma / Ano:</label>
        <input type="text" id="turma" name="turma" placeholder="Ex: 3º Ano A - Ensino Médio" required>
    
        <label for="horario">Horário da Reserva:</label>
        <input type="time" id="horario" name="horario" required>
    
        <button type="submit">Confirmar Reserva</button>
    </form>
    <form class="formulario-login">
        <h2>Acessar o Sistema</h2>
        
        <label for="email-login">E-mail:</label>
        <input type="email" id="email-login" name="email" placeholder="seu-email@email.com" required>
    
        <label for="senha-login">Senha:</label>
        <input type="password" id="senha-login" name="senha" placeholder="Digite sua senha" required>
    
        <button type="submit">Entrar</button>
    </form>
    <form class="formulario-contato">
        <h2>Falar com a Coordenação</h2>
        
        <label for="assunto">Assunto:</label>
        <select id="assunto" name="assunto" required>
            <option value="" disabled selected>Selecione um assunto...</option>
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="reclamacao">Reclamação / Problema</option>
            <option value="outro">Outro</option>
        </select>
    
        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" placeholder="Digite detalhadamente o que aconteceu ou o que você precisa..." rows="6" required></textarea>
    
        <button type="submit">Enviar Mensagem</button>
    </form>
    
</body>
</html>
